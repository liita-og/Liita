name: liita
description: "Liita — Connect with nearby travelers over BLE mesh"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.31.0

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Crypto
  pointycastle: ^3.9.0
  crypto: ^3.0.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # State Management
  flutter_riverpod: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # Utilities
  uuid: ^4.4.0
  google_fonts: ^6.0.0
  image_picker: ^1.0.0
  collection: ^1.18.0
  permission_handler: ^12.0.3
  flutter_image_compress: ^2.4.0
  flutter_neumorphic_plus: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
